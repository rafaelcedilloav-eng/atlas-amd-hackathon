- name: atlas-frontend
  github:
    repo: rafaelcedilloav-eng/atlas-amd-hackathon
    branch: main
    deploy_on_push: true
  source_dir: /frontend
  dockerfile_path: /frontend/Dockerfile
  http_port: 3000
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  envs:
  - key: NEXT_PUBLIC_API_URL
    scope: BUILD_TIME
    value: "https://atlas-amd-qs5g4.ondigitalocean.app"
