name: atlas-amd
region: atl
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  # API routes → backend (orden importa: más específico primero)
  - component:
      name: atlas-amd-hackathon
    match:
      path:
        prefix: /upload
  - component:
      name: atlas-amd-hackathon
    match:
      path:
        prefix: /analyze
  - component:
      name: atlas-amd-hackathon
    match:
      path:
        prefix: /result
  - component:
      name: atlas-amd-hackathon
    match:
      path:
        prefix: /audit-list
  - component:
      name: atlas-amd-hackathon
    match:
      path:
        prefix: /stats
  - component:
      name: atlas-amd-hackathon
    match:
      path:
        prefix: /human_decision
  - component:
      name: atlas-amd-hackathon
    match:
      path:
        prefix: /docs
  - component:
      name: atlas-amd-hackathon
    match:
      path:
        prefix: /openapi.json
  # Todo lo demás → frontend Next.js
  - component:
      name: atlas-frontend
    match:
      path:
        prefix: /
services:
- name: atlas-amd-hackathon
  github:
    repo: rafaelcedilloav-eng/atlas-amd-hackathon
    branch: main
    deploy_on_push: true
  source_dir: /
  dockerfile_path: /Dockerfile
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  envs:
  - key: VLLM_BASE_URL
    scope: RUN_AND_BUILD_TIME
    value: "http://165.245.138.52:8000/v1"
  - key: VLLM_MODEL
    scope: RUN_AND_BUILD_TIME
    value: "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"
  - key: VLLM_TIMEOUT
    scope: RUN_AND_BUILD_TIME
    value: "120"
  - key: VLLM_MAX_TOKENS
    scope: RUN_AND_BUILD_TIME
    value: "4096"
  - key: VLLM_TEMPERATURE
    scope: RUN_AND_BUILD_TIME
    value: "0.1"
  - key: VLLM_API_KEY
    scope: RUN_AND_BUILD_TIME
    value: "not-needed"
  - key: SUPABASE_URL
    scope: RUN_AND_BUILD_TIME
    value: "https://fkjwaubqwvcereilllow.supabase.co"
  - key: SUPABASE_REST_API
    scope: RUN_AND_BUILD_TIME
    value: "https://fkjwaubqwvcereilllow.supabase.co/rest/v1/"
  - key: SUPABASE_SERVICE_KEY
