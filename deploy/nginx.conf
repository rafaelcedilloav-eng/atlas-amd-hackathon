server {
    listen 80;
    server_name www.atlas-hackathon.com atlas-hackathon.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.atlas-hackathon.com atlas-hackathon.com;

    ssl_certificate     /etc/letsencrypt/live/atlas-hackathon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atlas-hackathon.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 90s;
    }
}

server {
    listen 80;
    server_name api.atlas-hackathon.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.atlas-hackathon.com;

    ssl_certificate     /etc/letsencrypt/live/atlas-hackathon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atlas-hackathon.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }
}
